<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Calendar Assistant</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    height: 100vh;
    display: grid;
    grid-template-columns: 350px 1fr;
    grid-template-rows: auto 1fr;
    background: #f5f5f5;
}

/* Top title bar spanning full width */
.app-title {
    grid-column: 1 / 3;
    grid-row: 1;
    padding: 20px 25px;
    background: #4a90d9;
    color: white;
    font-size: 1.4em;
    font-weight: 600;
}

/* Left column - Chat */
.left-panel {
    grid-column: 1;
    grid-row: 2;
    display: flex;
    flex-direction: column;
    background: #fff;
    border-right: 1px solid #ddd;
}

.chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
}

#chat {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #fafafa;
}

.message {
    padding: 10px 14px;
    border-radius: 12px;
    max-width: 85%;
    animation: fadeIn 0.2s ease-out;
    line-height: 1.4;
    font-size: 0.95em;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}

.user {
    background: #4a90d9;
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
}

.agent {
    background: #e9ecef;
    color: #333;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    white-space: pre-wrap;
}

#inputArea {
    padding: 15px;
    display: flex;
    gap: 10px;
    background: #fff;
    border-top: 1px solid #eee;
}

#message {
    flex: 1;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 0.95em;
    outline: none;
}

#message:focus { border-color: #4a90d9; }

#send {
    padding: 12px 20px;
    background: #4a90d9;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
}

#send:hover { background: #3a7bc8; }
#send:disabled { background: #a0c4e8; cursor: not-allowed; }

/* Right column - Calendar */
.calendar-panel {
    grid-column: 2;
    grid-row: 2;
    padding: 25px;
    overflow-y: auto;
}

.calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.calendar-header h2 {
    font-size: 1.5em;
    color: #333;
}

.calendar-nav {
    display: flex;
    gap: 10px;
}

.calendar-nav button {
    padding: 8px 16px;
    border: 1px solid #ddd;
    background: white;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9em;
}

.calendar-nav button:hover { background: #f0f0f0; }

.calendar {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    overflow: hidden;
}

.calendar-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: #4a90d9;
    color: white;
}

.calendar-weekdays div {
    padding: 12px;
    text-align: center;
    font-weight: 600;
    font-size: 0.85em;
}

.calendar-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
}

.calendar-day {
    min-height: 100px;
    padding: 8px;
    border: 1px solid #eee;
    cursor: pointer;
    transition: background 0.2s;
}

.calendar-day:hover { background: #f8f9fa; }

.calendar-day.other-month {
    background: #fafafa;
    color: #aaa;
}

.calendar-day.today {
    background: #e3f2fd;
}

.day-number {
    font-weight: 600;
    font-size: 0.9em;
    margin-bottom: 5px;
}

.day-events {
    display: flex;
    flex-direction: column;
    gap: 3px;
}

.event-item {
    background: #4a90d9;
    color: white;
    padding: 3px 6px;
    border-radius: 4px;
    font-size: 0.75em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
</style>
</head>
<body>

<!-- Top Title Bar -->
<div class="app-title">📅 AI Calendar Assistant</div>

<!-- Left Panel: Chat -->
<div class="left-panel">
    <div class="chat-container">
        <div id="chat"></div>
        <div id="inputArea">
            <input type="text" id="message" placeholder="Type a message..." />
            <button id="send">Send</button>
        </div>
    </div>
</div>

<!-- Right Panel: Calendar -->
<div class="calendar-panel">
    <div class="calendar-header">
        <h2 id="calendarTitle">February 2026</h2>
        <div class="calendar-nav">
            <button id="prevMonth">← Prev</button>
            <button id="todayBtn">Today</button>
            <button id="nextMonth">Next →</button>
        </div>
    </div>
    <div class="calendar">
        <div class="calendar-weekdays">
            <div>Sun</div>
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
        </div>
        <div class="calendar-days" id="calendarDays"></div>
    </div>
</div>

<script>
const chat = document.getElementById('chat');
const messageInput = document.getElementById('message');
const sendButton = document.getElementById('send');
const conversationId = "default";

// Calendar state
let currentDate = new Date();
let currentMonth = currentDate.getMonth();
let currentYear = currentDate.getFullYear();
let events = {}; // Store events by date key "YYYY-MM-DD"

// Chat functionality
sendButton.onclick = async () => {
    const msg = messageInput.value.trim();
    if (!msg) return;

    sendButton.disabled = true;

    const userBubble = document.createElement('div');
    userBubble.className = 'message user';
    userBubble.textContent = msg;
    chat.appendChild(userBubble);
    messageInput.value = '';

    const loadingBubble = document.createElement('div');
    loadingBubble.className = 'message agent';
    loadingBubble.textContent = 'Thinking...';
    chat.appendChild(loadingBubble);
    chat.scrollTop = chat.scrollHeight;

    try {
        const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ conversation_id: conversationId, message: msg })
        });

        if (!res.ok) {
            loadingBubble.textContent = `Error: ${res.status} ${res.statusText}`;
            return;
        }
        const data = await res.json();
        loadingBubble.textContent = data.reply || "No reply from server";

        // Update calendar if events were created/updated/deleted
        if (data.metadata) {
            if (data.metadata.events_created) {
                data.metadata.events_created.forEach(addEventToCalendar);
            }
            if (data.metadata.events_updated) {
                data.metadata.events_updated.forEach(updateEventInCalendar);
            }
            if (data.metadata.events_deleted) {
                data.metadata.events_deleted.forEach(e => {
                    const dateKey = e.start_time.split(' ')[0];
                    if (events[dateKey]) {
                        events[dateKey] = events[dateKey].filter(ev => ev.event_id !== e.event_id);
                    }
                });
                renderCalendar();
            }
        }
    } catch (err) {
        loadingBubble.textContent = "Error: could not reach backend";
        console.error(err);
    } finally {
        sendButton.disabled = false;
        chat.scrollTop = chat.scrollHeight;
    }
};

messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !sendButton.disabled) sendButton.click();
});

// Calendar functionality
function addEventToCalendar(event) {
    const dateKey = event.start_time.split(' ')[0];
    if (!events[dateKey]) events[dateKey] = [];
    events[dateKey].push(event);
    renderCalendar();
}

function updateEventInCalendar(updatedEvent) {
    // First, remove the old event from all date keys (in case date changed)
    for (const dateKey in events) {
        events[dateKey] = events[dateKey].filter(e => e.event_id !== updatedEvent.event_id);
        // Clean up empty date keys
        if (events[dateKey].length === 0) {
            delete events[dateKey];
        }
    }
    // Then add the updated event to its new date
    const newDateKey = updatedEvent.start_time.split(' ')[0];
    if (!events[newDateKey]) events[newDateKey] = [];
    events[newDateKey].push(updatedEvent);
    renderCalendar();
}

function renderCalendar() {
    const calendarDays = document.getElementById('calendarDays');
    const calendarTitle = document.getElementById('calendarTitle');

    const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                        'July', 'August', 'September', 'October', 'November', 'December'];

    calendarTitle.textContent = `${monthNames[currentMonth]} ${currentYear}`;

    const firstDay = new Date(currentYear, currentMonth, 1);
    const lastDay = new Date(currentYear, currentMonth + 1, 0);
    const startingDay = firstDay.getDay();
    const totalDays = lastDay.getDate();

    const today = new Date();
    const todayKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

    let html = '';

    // Previous month days
    const prevMonthLastDay = new Date(currentYear, currentMonth, 0).getDate();
    for (let i = startingDay - 1; i >= 0; i--) {
        const day = prevMonthLastDay - i;
        html += `<div class="calendar-day other-month"><div class="day-number">${day}</div></div>`;
    }

    // Current month days
    for (let day = 1; day <= totalDays; day++) {
        const dateKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const isToday = dateKey === todayKey;
        const dayEvents = events[dateKey] || [];

        let eventsHtml = '';
        // Sort events by start time
        const sortedEvents = [...dayEvents].sort((a, b) => {
            const timeA = a.start_time.split(' ')[1] || '00:00:00';
            const timeB = b.start_time.split(' ')[1] || '00:00:00';
            return timeA.localeCompare(timeB);
        });
        sortedEvents.forEach(e => {
            const time = e.start_time.split(' ')[1]?.substring(0, 5) || '';
            eventsHtml += `<div class="event-item" title="${e.title}">${time} ${e.title}</div>`;
        });

        html += `
            <div class="calendar-day${isToday ? ' today' : ''}" data-date="${dateKey}">
                <div class="day-number">${day}</div>
                <div class="day-events">${eventsHtml}</div>
            </div>
        `;
    }

    // Next month days
    const remainingCells = 42 - (startingDay + totalDays);
    for (let day = 1; day <= remainingCells; day++) {
        html += `<div class="calendar-day other-month"><div class="day-number">${day}</div></div>`;
    }

    calendarDays.innerHTML = html;
}

// Calendar navigation
document.getElementById('prevMonth').onclick = () => {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
};

document.getElementById('nextMonth').onclick = () => {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderCalendar();
};

document.getElementById('todayBtn').onclick = () => {
    const today = new Date();
    currentMonth = today.getMonth();
    currentYear = today.getFullYear();
    renderCalendar();
};

// Initial render
renderCalendar();
</script>
</body>
</html>
