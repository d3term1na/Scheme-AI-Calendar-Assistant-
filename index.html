<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calendar Agent Chat</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #chat { border: 1px solid #ccc; padding: 10px; height: 400px; overflow-y: auto; }
    .message { margin: 5px 0; padding: 5px 10px; border-radius: 5px; max-width: 70%; }
    .user { background-color: #d1e7dd; align-self: flex-end; margin-left: auto; }
    .agent { background-color: #f8d7da; align-self: flex-start; margin-right: auto; }
    #inputArea { margin-top: 10px; display: flex; }
    #message { flex: 1; padding: 5px; }
    #send { padding: 5px 10px; margin-left: 5px; }
    #chatContainer { display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <h2>Calendar Agent Chat</h2>
  <div id="chatContainer">
    <div id="chat"></div>
    <div id="inputArea">
      <input type="text" id="message" placeholder="Type your message..." />
      <button id="send">Send</button>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const messageInput = document.getElementById('message');
    const sendButton = document.getElementById('send');
    const conversationId = "default"; // simple static ID for Phase 1

    sendButton.onclick = async () => {
      const msg = messageInput.value.trim();
      if (!msg) return;

      // Add user message to chat
      const userBubble = document.createElement('div');
      userBubble.className = 'message user';
      userBubble.textContent = msg;
      chat.appendChild(userBubble);

      // Clear input
      messageInput.value = '';

      // Show loading bubble
      const loadingBubble = document.createElement('div');
      loadingBubble.className = 'message agent';
      loadingBubble.textContent = 'Thinking...';
      chat.appendChild(loadingBubble);
      chat.scrollTop = chat.scrollHeight;

      try {
        const res = await fetch('http://127.0.0.1:8000/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ conversation_id: conversationId, message: msg })
        });
        const data = await res.json();

        // Replace loading bubble with actual reply
        loadingBubble.textContent = data.reply;
        chat.scrollTop = chat.scrollHeight;
      } catch (error) {
        loadingBubble.textContent = "Error: could not reach backend.";
        console.error(error);
      }
    };

    // Optional: allow Enter key to send
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendButton.click();
    });
  </script>
</body>
</html>
